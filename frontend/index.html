<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<link rel="stylesheet" href="styles/styles.css">
	<link rel="icon" href="favicon.ico">
</head>

<body>
	<button id="playBtn">Play</button>
	<button id="homeBtn">Home</button>
	<button id="settingsBtn">Settings</button>

	<div id="settings" class="dropdown-content">
		<ul>
			<li>
				<label for="fontSizeRange">Font Size:</label>
				<input type="range" id="fontSizeRange" min="10" max="25" value="15" step="1">
				<span id="fontSizeValue">15rem</span>
			</li>
			<li>
				<label for="bgColorSelect">Background Color:</label>
				<select id="bgColorSelect">
					<option value="black">Black</option>
					<option value="white">White</option>
					<option value="lightgray">Light Gray</option>
					<option value="lightblue">Light Blue</option>
				</select>
			</li>
		</ul>
		<button id="saveSettingsBtn">Apply</button>
	</div>

	<div id="gameContainer">
		<div id="gameArea">
			<canvas id="gameCanvas" width="800" height="600"></canvas>
		</div>
		<div id="chatContainer">
			<div id="chatOutput"></div>
			<input type="text" id="chatInput" placeholder="Enter your message here">
		</div>
		<div id="gameStatus" class="button-container">
			<button id="restartBtn">Restart</button>
			<button id="surrenderBtn">Surrender</button>
			<button id="gameStatusBtn">Pause</button>
		</div>
	</div>

	<script type="module" src="scripts/main.js"></script>
</body>

</html>
