<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ft_transcendence</title>
	<link rel="stylesheet" href="styles/styles.css">
</head>

<body>
	<!-- Cursor -->
	<div id="spotlight" class="spotlight"></div>
	<!-- Language Switcher -->
	<button id="languageSwitcher" class="language-switcher" aria-label="Switch Language">🇫🇷</button>

	<!-- Game -->
	<button id="playButton" class="custom-button" data-lang-fr="Jouer" data-lang-en="Play" aria-label="Play">Play</button>
	<div id="loadingSpinner" class="loading-spinner" style="display: none;"></div>

	<!-- Slider for Flashlight Size -->
	<div class="slider-container">
		<label for="flashlightSize">Flashlight Size</label>
		<input type="range" id="flashlightSize" name="flashlightSize" min="50" max="300" value="100">
	</div>

	<script src="js/drawOnBackground.js"></script>
	<script src="js/cursorFlashlight.js"></script>
	<script src="js/languageSwitcher.js"></script>
</body>

</html>
