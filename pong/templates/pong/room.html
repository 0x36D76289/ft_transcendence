<!DOCTYPE html>
<html>
	<head>
	</head>
	<body>
		<!--INFO: The pong game currently determines what room it's in using this rooname p tag but will have to use django kwargs in a better way, possibly just load directly into the JS-->
		<p>GAME ID:</p><p id="rooname">{{room_name}}</p>
		<!--INFO: You can use any width/height but to change the internal resolution go to JS, they don't have to match just be same aspect ratio-->
		<canvas id="game" width="600" height="450" style="border:1px solid #CCC;">you're not supposed to see this</canvas>

		<!--HACK: These buttons are all debug features, not keeping them-->
		<input id="the_button" type="button" value="TEST">
		<input id="reset" type="button" value="RESET">
		<input id="erase" type="button" value="ERASE">
		<input id="draw" type="button" value="DRAW">
		<input id="send_score_0" type="button" value="send score 0 0">
		<input id="send_score_1" type="button" value="send score 1 0">
		<input id="send_score_w" type="button" value="win game">
		<input id="print_input" type="button" value="print keys">
		<input id="shutup" type="button" value="shutup">
		<input id="disconnect" type="button" value="disconnect">
		<script>
			const ROOM_NAME = document.getElementById("rooname").textContent;
			const sock = new WebSocket(
				"ws://" +
				window.location.host +
				'/ws/pong/' +
				ROOM_NAME +
				'/'
				)

			//TODO: wait for socket to connect ?
			//TODO: error on enemy socket close ?
			{
				const VIEW = document.getElementById("game");
				const VIEW_DIMENSIONS = [VIEW.width, VIEW.height]
				const GAME_DIMENSIONS = [400, 300]
				const ctx = VIEW.getContext("2d")
				let keys = new Set();
				window.addEventListener('keydown', function (e) {keys.add(e.key)})
				window.addEventListener('keyup', function (e) {keys.delete(e.key)})

				function draw_rect(x1, y1, x2, y2) {

					//TODO: buffer rendering to avoid flashes
					ctx.fillStyle = "black"
					ctx.fillRect(
						x1 * VIEW_DIMENSIONS[0] / GAME_DIMENSIONS[0],
						y1 * VIEW_DIMENSIONS[1] / GAME_DIMENSIONS[1],
						(x2-x1) * VIEW_DIMENSIONS[0] / GAME_DIMENSIONS[0],
						(y2-y1) * VIEW_DIMENSIONS[1] / GAME_DIMENSIONS[1]
					);
				}

				function reset() {
					ctx.fillStyle = "white"
					ctx.fillRect(0, 0, VIEW_DIMENSIONS[0], VIEW_DIMENSIONS[1]);
				}


				const GAME_SETTINGS = {
					paddle_width: 5,
					paddle_height: 20,
					paddle_speed: 4,
					ball_size: 3,
					ball_speed: 5,
					ball_y_speed_factor: 3,
				}
				let interval = undefined;
				let player_num = 0;
				let inputs = []
				let scores = [0, 0]
				let current_frame = 0
				let last_processed_frame = 0
				let current_state = {
					frame: 0,
					ball_x: 0,
					ball_y: 0,
					p1_height: 0,
					p2_height: 0,
					ball_speed_x: 0,
					ball_speed_y: 0
				};
				let last_processed_state = Object.assign({}, current_state)


				function init() {
					//set values for current_state
					inputs = [[0, 0]]
					current_frame = 0
					current_state.frame = current_frame
					current_state.ball_x = (GAME_DIMENSIONS[0] / 2) | 0
					current_state.ball_y = (GAME_DIMENSIONS[1] / 2) | 0
					current_state.p1_height = current_state.ball_y
					current_state.p2_height = current_state.ball_y
					current_state.ball_speed_y = -GAME_SETTINGS.ball_speed
					current_state.ball_speed_x = GAME_SETTINGS.ball_speed
					if (scores[0] <= scores[1]) {
						current_state.ball_speed_x *= -1;
					}
					last_processed_state = Object.assign({}, current_state)
				}

				function tick(state, input) {
					let ret = Object.assign({}, state);

					ret.frame = state.frame + 1

					// move paddles
					ret.p1_height += input[0] * GAME_SETTINGS.paddle_speed
					ret.p2_height += input[1] * GAME_SETTINGS.paddle_speed
					function bound(pos, size, min, max) {
						if (pos - size < min)
							return min + size
						if (pos + size > max)
							return max - size
						return pos
					}
					ret.p1_height = bound(ret.p1_height, GAME_SETTINGS.paddle_height, 0, GAME_DIMENSIONS[1])
					ret.p2_height = bound(ret.p2_height, GAME_SETTINGS.paddle_height, 0, GAME_DIMENSIONS[1])

					// move ball
					ret.ball_x += ret.ball_speed_x
					ret.ball_y += ret.ball_speed_y
					ret.ball_x = bound(ret.ball_x, GAME_SETTINGS.ball_size, 0, GAME_DIMENSIONS[0])
					ret.ball_y = bound(ret.ball_y, GAME_SETTINGS.ball_size, 0, GAME_DIMENSIONS[1])

					// horizontal bounce
					if (ret.ball_x == GAME_SETTINGS.ball_size || ret.ball_x == GAME_DIMENSIONS[0] - GAME_SETTINGS.ball_size) {
						ret.ball_speed_x *= -1
						if (ret.ball_x == GAME_SETTINGS.ball_size)
							ret.ball_speed_y = ret.ball_y - ret.p1_height
						else
							ret.ball_speed_y = ret.ball_y - ret.p2_height
						ret.ball_speed_y /= GAME_SETTINGS.ball_y_speed_factor
						ret.ball_speed_y = ret.ball_speed_y | 0

						if (ret.ball_x == GAME_SETTINGS.ball_size && player_num == 1 && (ret.ball_y - GAME_SETTINGS.ball_size > ret.p1_height + GAME_SETTINGS.paddle_height || ret.ball_y + GAME_SETTINGS.ball_size < ret.p1_height - GAME_SETTINGS.paddle_height)) {
							console.log("I died on 1");
							scores[1] += 1;
							sock.send(JSON.stringify({
								type:"score",
								p1: scores[0],
								p2: scores[1]
							}))
						}
						if (ret.ball_x == GAME_DIMENSIONS[0] - GAME_SETTINGS.ball_size && player_num == 2 && (ret.ball_y - GAME_SETTINGS.ball_size > ret.p2_height + GAME_SETTINGS.paddle_height || ret.ball_y + GAME_SETTINGS.ball_size < ret.p2_height - GAME_SETTINGS.paddle_height)) {
							scores[0] += 1;
							sock.send(JSON.stringify({
								type:"score",
								p1: scores[0],
								p2: scores[1]
							}))
						}

					}
					// ceiling/floor bounce
					if (ret.ball_y == GAME_SETTINGS.ball_size || ret.ball_y == GAME_DIMENSIONS[1] - GAME_SETTINGS.ball_size)
						ret.ball_speed_y *= -1
					return ret
				}
				function update() {
					// go forward
					current_frame += 1

					// process local input
					if (inputs.length <= current_frame) {
						inputs[current_frame] = [undefined, undefined];
					}
					if (keys.has("ArrowUp")) {
						inputs[current_frame][player_num - 1] = -1;
					} else if (keys.has("ArrowDown")) {
						inputs[current_frame][player_num - 1] = 1;
					} else {
						inputs[current_frame][player_num - 1] = 0;
					}

					//send input
					sock.send(JSON.stringify({
						type: "input",
						frame: current_frame,
						input: inputs[current_frame][player_num - 1],
						player: player_num,
					}));

					// zip to last processed frame and recalculate until now
					// assume input is same for every frame since last input received before the calculated instance
					let validating = true
					let frame_input_count = 0
					current_state = Object.assign({}, last_processed_state);
					let input = [ // TODO: check off by one
						inputs[current_state.frame][0],
						inputs[current_state.frame][1]
						]
					while (current_state.frame < current_frame) {
						frame_input_count = 0
						current_state = tick(current_state, input)
						if (inputs[current_state.frame][0] != undefined) {
							input[0] = inputs[current_state.frame][0]
							frame_input_count += 1;
						}
						if (inputs[current_state.frame][1] != undefined) {
							input[1] = inputs[current_state.frame][1]
							frame_input_count += 1;
						}
						current_state = tick(current_state, input)
						if (validating && frame_input_count == 2) {
							last_processed_state = Object.assign({}, current_state);
							last_processed_frame = last_processed_state.frame
						} else {
							validating = false
						}
					}
					draw()
					//TODO: save 3 frame buffer and render a bit late
					// create an array of size 3 and save during while loop at the right place
					// only draw if array is of size 3
				}
				function draw() {
					//TODO: draw score somewhere
					let state = current_state
					reset()
					//draw paddle 1
					draw_rect(
						0,
						state.p1_height - GAME_SETTINGS.paddle_height,
						GAME_SETTINGS.paddle_width,
						state.p1_height + GAME_SETTINGS.paddle_height
					)
					//draw paddle 2
					draw_rect(
						GAME_DIMENSIONS[0] - GAME_SETTINGS.paddle_width,
						state.p2_height - GAME_SETTINGS.paddle_height,
						GAME_DIMENSIONS[0],
						state.p2_height + GAME_SETTINGS.paddle_height
					)
					//draw ball
					draw_rect(
						state.ball_x - GAME_SETTINGS.ball_size,
						state.ball_y - GAME_SETTINGS.ball_size,
						state.ball_x + GAME_SETTINGS.ball_size,
						state.ball_y + GAME_SETTINGS.ball_size
						)
				}
				sock.onmessage = function(object) {
					try {
						let inner = JSON.parse(object.data);
						if (inner.type == "player_assign") {
							player_num = inner.value;
							console.log("Assigned to player ", player_num);
							if (player_num == 2) {
								sock.send('{"type":"score","p1":0, "p2": 0}')
							}
						} else if (inner.type == "score") {
							console.log("received score update ", inner);
							scores[0] = inner.p1;
							scores[1] = inner.p2;
							clearInterval(interval);
							init()
							interval = setInterval(update, 1000/60)
						} else if (inner.type == "input") {
							while (inner.frame >= inputs.length) {
								inputs[inputs.length] = [undefined, undefined]
							}
							inputs[inner.frame][inner.player - 1] = inner.input;
						}

					} catch (e) {
						console.log("couldn't parse: ", object.data);
						return
					}
				}

				// HACK: debug features
				document.getElementById("the_button").onclick = function() {console.log("TEST")}
				document.getElementById("reset").onclick = function() {init()}
				document.getElementById("erase").onclick = function() {reset()}
				document.getElementById("draw").onclick = function() {draw(current_state)}
				document.getElementById("send_score_0").onclick = function() {sock.send('{"type":"score","p1":0, "p2": 0}')}
				document.getElementById("send_score_1").onclick = function() {sock.send('{"type":"score","p1":1, "p2": 0}')}
				document.getElementById("send_score_w").onclick = function() {sock.send('{"type":"score","p1":10, "p2": 0}')}
				document.getElementById("print_input").onclick = function() {console.log(keys)}
				document.getElementById("shutup").onclick = function() {clearTimeout(interval)}
				document.getElementById("disconnect").onclick = function() {sock.close()}
				//HACK: temporary ""thing"" to see if game started yet, will be replaced with an intro screen
				draw_rect(200, 150, 380, 280)
				console.log("display ", VIEW_DIMENSIONS)
				console.log("game ", GAME_DIMENSIONS)
			}
		</script>
	</body>
